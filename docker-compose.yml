services:
  backend:
    build: .
    container_name: portfolio-backend
    restart: unless-stopped
    # All env (DATABASE_URL, REDIS_URL, JWT_*, FIREBASE_*, SANITY_*, RESEND_*,
    # CORS_ORIGINS, COOKIE_DOMAIN, OWNER_EMAIL, etc.) is read from .env on the
    # VPS — never committed. See .env.example for the full list.
    env_file:
      - .env
    networks:
      - shared-network

networks:
  shared-network:
    external: true
